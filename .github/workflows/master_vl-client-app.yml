# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - vl-client-app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Set API base for build
        # replace with your real server URL
        run: echo "VITE_API_BASE_URL=https://vl-server-app.azurewebsites.net" >> $GITHUB_ENV

      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: client-artifact
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: client-artifact

      # If you prefer not to create an Azure service principal secret,
      # use the App Service publish profile instead:
      # 1) Portal -> App Services -> vl-client-app -> Get publish profile
      # 2) GitHub -> repo -> Settings -> Secrets and variables -> Actions -> New repository secret
      #    Name: AZURE_WEBAPP_PUBLISH_PROFILE
      #    Value: (paste contents of the downloaded publish profile XML)
      - name: 'Deploy to Azure Web App (publish profile)'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vl-client-app'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
          